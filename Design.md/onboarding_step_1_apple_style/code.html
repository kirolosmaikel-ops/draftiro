<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Step 1 - LexJurist AI</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "apple-bg": "#FFFFFF",
                        "apple-gray-bg": "#F5F5F7",
                        "apple-border": "#C7C7CC",
                        "apple-text-secondary": "#AEAEB2",
                        "apple-black": "#1D1D1F",
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        };
    </script>
<style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .apple-dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23C7C7CC' stroke-width='1.5' stroke-dasharray='6%2c 6' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            border-radius: 12px;
        }
        .hairline-border {
            box-shadow: 0 0 0 0.5px #C7C7CC;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-apple-bg text-apple-black font-sans min-h-screen flex items-center justify-center p-6">
<!-- Onboarding Container -->
<main class="w-full max-w-[640px] flex flex-col items-center">
<!-- Header Section -->
<div class="text-center mb-12">
<span class="text-[13px] font-medium text-apple-text-secondary tracking-tight mb-3 block">Step 1 of 2</span>
<h1 class="text-[40px] leading-tight font-bold tracking-tight text-apple-black">
                Add your first case file.
            </h1>
</div>
<!-- Upload Dropzone -->
<div class="w-full mb-10">
<div class="group relative w-full aspect-[16/8] bg-apple-gray-bg apple-dashed-border flex flex-col items-center justify-center cursor-pointer hover:bg-[#F2F2F7] transition-colors duration-200">
<div class="mb-4 text-apple-black">
<span class="material-symbols-outlined text-[48px]" data-icon="cloud_upload">cloud_upload</span>
</div>
<p class="text-[15px] font-medium mb-1">Click or drag files here</p>
<p class="text-[13px] text-apple-text-secondary">PDF, DOCX, TXT up to 500MB</p>
</div>
</div>
<!-- Quick Start Samples -->
<div class="w-full flex flex-col items-center gap-6 mb-12">
<span class="text-[13px] font-medium text-apple-text-secondary">Or start with a sample</span>
<div class="flex flex-wrap justify-center gap-3">
<button class="flex items-center gap-2 px-5 py-2.5 bg-white hairline-border text-[14px] font-medium rounded-full hover:bg-apple-gray-bg transition-colors duration-200">
<span class="material-symbols-outlined text-[18px] text-apple-text-secondary" data-icon="description">description</span>
<span>Sample NDA.pdf</span>
</button>
<button class="flex items-center gap-2 px-5 py-2.5 bg-white hairline-border text-[14px] font-medium rounded-full hover:bg-apple-gray-bg transition-colors duration-200">
<span class="material-symbols-outlined text-[18px] text-apple-text-secondary" data-icon="gavel">gavel</span>
<span>Sample Deposition.pdf</span>
</button>
<button class="flex items-center gap-2 px-5 py-2.5 bg-white hairline-border text-[14px] font-medium rounded-full hover:bg-apple-gray-bg transition-colors duration-200">
<span class="material-symbols-outlined text-[18px] text-apple-text-secondary" data-icon="account_balance">account_balance</span>
<span>Sample Motion.pdf</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="w-full flex flex-col items-center gap-6">
<button class="bg-apple-black text-white w-full max-w-[280px] py-3.5 rounded-[12px] text-[17px] font-semibold hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
                Upload &amp; Continue <span class="text-xl">→</span>
</button>
<button class="text-[15px] font-medium text-apple-text-secondary hover:text-apple-black transition-colors duration-200">
                I'll do this later
            </button>
</div>
<!-- Semantic Footer -->
<footer class="mt-24 text-center">
<div class="flex items-center justify-center gap-3 opacity-40">
<span class="text-[13px] font-semibold tracking-tight">LexJurist AI</span>
<div class="w-[1px] h-3 bg-apple-black"></div>
<span class="text-[11px] font-medium uppercase tracking-widest">Draftiro</span>
</div>
</footer>
</main>
</body></html>
